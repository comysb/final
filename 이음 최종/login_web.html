<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>이음 로그인</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #4a6ef5 0%, #3B5FE8 45%, #2a44cc 100%);
      position: relative;
      overflow: hidden;
    }

    /* 배경 장식 */
    body::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -100px; right: -80px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: rgba(232,197,71,0.10);
      pointer-events: none;
    }

    /* 카드 */
    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 50px 52px 44px;
      width: 480px;
      box-shadow:
        0 32px 80px rgba(26,26,46,0.20),
        0 8px 24px rgba(59,95,232,0.12);
      position: relative;
      z-index: 1;
    }

    /* 로고 + 타이틀 */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .logo-icon {
      width: 52px; height: 52px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(59,95,232,0.25);
    }
    .logo-icon img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .logo-name {
      font-size: 22px;
      font-weight: 800;
      color: #1A1A2E;
      letter-spacing: -0.5px;
    }
    .card-title {
      font-size: 28px;
      font-weight: 800;
      color: #1A1A2E;
      letter-spacing: -0.7px;
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 13.5px;
      color: #8892aa;
      font-weight: 400;
    }

    /* 구분선 */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e4e6f0 30%, #e4e6f0 70%, transparent);
      margin-bottom: 30px;
    }

    /* 폼 */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }
    label {
      font-size: 13px;
      font-weight: 600;
      color: #1A1A2E;
      letter-spacing: -0.2px;
    }
    .input-wrap {
      position: relative;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      height: 52px;
      border: 1.5px solid #e4e6f0;
      border-radius: 12px;
      background: #f9fafc;
      padding: 0 48px 0 18px;
      font-family: 'Pretendard', sans-serif;
      font-size: 14.5px;
      color: #1A1A2E;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder {
      color: #c2c6d6;
      font-weight: 400;
      font-size: 14px;
    }
    input:focus {
      border-color: #3B5FE8;
      background: #ffffff;
      box-shadow: 0 0 0 3.5px rgba(59,95,232,0.12);
    }
    .input-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #c2c6d6;
      font-size: 17px;
      pointer-events: none;
      transition: color 0.2s;
    }
    input:focus ~ .input-icon { color: #3B5FE8; }

    /* 로그인 버튼 */
    .login-btn {
      width: 100%;
      height: 54px;
      margin-top: 8px;
      background: linear-gradient(135deg, #4a6ef5 0%, #3B5FE8 100%);
      border: none;
      border-radius: 14px;
      color: #ffffff;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(59,95,232,0.36);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(59,95,232,0.42);
    }
    .login-btn:active { transform: translateY(0); }

    /* 하단 링크 */
    .bottom-links {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 20px;
      margin-top: 22px;
    }
    .link-btn {
      font-size: 13px;
      font-weight: 500;
      color: #8892aa;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: -0.2px;
      transition: color 0.15s;
      background: none;
      border: none;
      font-family: 'Pretendard', sans-serif;
    }
    .link-btn:hover { color: #3B5FE8; }
    .link-sep {
      width: 1px; height: 12px;
      background: #d4d8e6;
    }
    .link-signup {
      font-size: 13px;
      font-weight: 700;
      color: #3B5FE8;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: -0.2px;
      transition: opacity 0.15s;
      background: none;
      border: none;
      font-family: 'Pretendard', sans-serif;
    }
    .link-signup:hover { opacity: 0.7; }

    /* 하단 골드 포인트 바 */
    .gold-bar {
      position: absolute;
      bottom: 0; left: 52px; right: 52px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #E8C547, transparent);
      border-radius: 0 0 2px 2px;
    }
  </style>
</head>
